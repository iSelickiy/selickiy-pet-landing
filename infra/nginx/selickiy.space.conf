limit_req_zone $binary_remote_addr zone=deploy_limit:10m rate=6r/m;

server {
    listen 443 ssl http2;
    server_name selickiy.space www.selickiy.space;

    client_max_body_size 6M;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location = /deploy {
        limit_except POST { deny all; }
        limit_req zone=deploy_limit burst=2 nodelay;
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:9000/deploy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /uploads/ {
        root /var/lib/portfolio;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    ssl_certificate /etc/letsencrypt/live/selickiy.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/selickiy.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name selickiy.space www.selickiy.space;
    return 301 https://selickiy.space$request_uri;
}
