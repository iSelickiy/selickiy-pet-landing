name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://portfolio:portfolio@127.0.0.1:5432/portfolio
      NEXTAUTH_SECRET: ci-only-secret
      GOOGLE_CLIENT_ID: ci-client
      GOOGLE_CLIENT_SECRET: ci-secret
      ADMIN_EMAILS: admin@example.com
      NEXT_PUBLIC_SITE_URL: https://selickiy.space
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
